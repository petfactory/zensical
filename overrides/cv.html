{% extends "main.html" %}


{% block content %}


<!-- {# Initialize a variable to track the year change #} -->
{% set last_year = "" %}

  {% for item in page.meta.cv_data %}

    <!-- {# get the year from the fata strimg #} -->
    {% set current_year = item.date[:4] %}

    <!-- {# If the year is different from the last one, print the H1 #} -->
    {% if current_year != last_year %}
      <h2 id="{{ current_year }}" >{{ current_year }}
        <!-- <a class="headerlink" href="{{ current_year }}" aria-describedby="__tooltip2_34">¶</a> -->
      </h2>
      {% set last_year = current_year %}
    {% endif %}

    <!-- <p>{{ item.title }} - {{ item.start_date }}</p> -->
    <p>{{ item.title }}</p>

  {% endfor %}
